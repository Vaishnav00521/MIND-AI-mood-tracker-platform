version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: CyberpunkSecurePass2026!
      POSTGRES_DB: mindai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://dbadmin:CyberpunkSecurePass2026!@db:5432/mindai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=backend_core.settings
    depends_on:
      - db
      - redis

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend_core worker -l INFO
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://dbadmin:CyberpunkSecurePass2026!@db:5432/mindai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=backend_core.settings
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend_web
      dockerfile: Dockerfile.prod # Assume a standard NGINX multi-stage build exists
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
